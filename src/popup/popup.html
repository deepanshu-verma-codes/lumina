<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina</title>
    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container" id="app-container">
        <!-- Settings Panel -->
        <div id="settings-panel" class="settings-panel hidden">
            <div class="settings-header">
                <h2>Preferences</h2>
                <button class="close-icon-btn" id="close-settings">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <div class="settings-body">
                <div class="settings-group">
                    <label>Video Capture</label>
                    <div class="settings-card">
                        <div class="setting-row">
                            <span>Resolution</span>
                            <select id="video-quality" class="refined-select">
                                <option value="1080">1080p FHD</option>
                                <option value="720" selected>720p HD</option>
                                <option value="480">480p SD</option>
                            </select>
                        </div>
                        <div class="setting-row">
                            <span>Frame Rate</span>
                            <select id="fps" class="refined-select">
                                <option value="60">60 FPS</option>
                                <option value="30" selected>30 FPS</option>
                                <option value="24">24 FPS</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="settings-group">
                    <label>Automation</label>
                    <div class="settings-card">
                        <div class="setting-row">
                            <span>Auto-save</span>
                            <label class="switch small">
                                <input type="checkbox" id="auto-download" checked>
                                <span class="slider round"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <header class="main-header">
            <div class="brand">
                <div class="logo-circle">
                    <img src="../../icons/icon.png" alt="Lumina" width="18" height="18">
                </div>
                <h1>Lumina</h1>
            </div>
            <button class="icon-action-btn" id="settings-btn" title="Settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </header>

        <main class="content-wrapper">
            <!-- Setup Section -->
            <div id="setup-view">
                <div class="pill-tabs">
                    <button class="pill-tab active" id="tab-record" data-view="record-view-options">Record</button>
                    <button class="pill-tab" id="tab-snapshot" data-view="snapshot-view-options">Snapshot</button>
                </div>

                <!-- Record Options -->
                <div id="record-view-options" class="tab-panel">
                    <div class="control-grid-compact">
                        <div class="mini-card">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line></svg>
                            <span>Mic</span>
                            <label class="switch small">
                                <input type="checkbox" id="mic-toggle" checked>
                                <span class="slider round"></span>
                            </label>
                        </div>
                        <div class="mini-card">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 7l-7 5 7 5V7z"></path><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                            <span>Overlay</span>
                            <label class="switch small">
                                <input type="checkbox" id="camera-toggle">
                                <span class="slider round"></span>
                            </label>
                        </div>
                    </div>
                    <button id="start-record-btn" class="btn-primary-action">
                        <div class="pulse-dot-white"></div>
                        <span>Start Recording</span>
                    </button>
                </div>

                <!-- Snapshot Options -->
                <div id="snapshot-view-options" class="tab-panel hidden">
                    <div class="snapshot-grid">
                        <button id="cap-visible-btn" class="snapshot-card">
                            <div class="card-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg></div>
                            <div class="card-info">
                                <strong>Visible</strong>
                                <span>Current View</span>
                            </div>
                        </button>
                        <button id="cap-full-btn" class="snapshot-card">
                            <div class="card-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 3H5a2 2 0 0 0-2 2v3"></path><path d="M21 8V5a2 2 0 0 0-2-2h-3"></path><path d="M3 16v3a2 2 0 0 0 2 2h3"></path><path d="M16 21h3a2 2 0 0 0 2-2v-3"></path></svg></div>
                            <div class="card-info">
                                <strong>Full Page</strong>
                                <span>Scroll & Stitch</span>
                            </div>
                        </button>
                    </div>
                </div>

                <!-- Library -->
                <div class="library-container">
                    <div class="library-header">
                        <h2>Library</h2>
                        <button id="clear-history" class="btn-clear">Clear</button>
                    </div>
                    <div id="history-list" class="refined-list">
                        <div class="empty-state-text">No items recorded yet</div>
                    </div>
                </div>
            </div>

            <!-- Active Recording View -->
            <div id="recording-active-view" class="active-rec-view hidden">
                <div class="rec-focus-container">
                    <div class="rec-badge">
                        <div class="rec-dot"></div>
                        LIVE
                    </div>
                    <div class="timer-display-premium" id="timer-display">00:00</div>
                    <div class="rec-controls-row">
                        <button id="pause-button" class="btn-rec-circle" title="Pause/Resume">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                        </button>
                        <button id="stop-button-recording" class="btn-rec-circle stop" title="Stop">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="5" y="5" width="14" height="14" rx="2"></rect></svg>
                        </button>
                    </div>
                    <div class="active-status-bar">
                        <span id="mic-status" class="status-tag hidden">Mic Active</span>
                        <span id="cam-status" class="status-tag hidden">Cam Active</span>
                    </div>
                </div>
            </div>
        </main>

        <footer class="minimal-footer">
            <span id="status-bar">SYSTEM READY</span>
        </footer>
    </div>
    
    <canvas id="composition-canvas" style="display:none;"></canvas>
    <script type="module" src="popup.js"></script>
</body>
</html>
